<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Annie的14天自考闯关 | 15040+15043</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 16px 40px;
        }
        .app-container {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
        }
        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }
        .quiz-area {
            background: white;
            border-radius: 40px;
            padding: 30px 28px;
            box-shadow: 0 24px 44px -20px #1e293b80;
            border: 1px solid #e0eaf5;
        }
        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .subject-tabs {
            display: flex;
            gap: 10px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 60px;
        }
        .subject-tab {
            padding: 10px 26px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            background: transparent;
            transition: 0.15s;
            color: #64748b;
        }
        .subject-tab.active {
            background: #667eea;
            color: white;
            box-shadow: 0 6px 12px #667eea40;
        }
        .mode-tabs {
            display: flex;
            gap: 6px;
            background: #eef2f6;
            padding: 4px;
            border-radius: 40px;
            margin-left: 10px;
        }
        .mode-tab {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            background: transparent;
            color: #64748b;
        }
        .mode-tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px #94a3b8;
        }
        .progress-badge {
            background: #dbeafe;
            color: #1e4a7a;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .question-card {
            background: #fafcff;
            border-radius: 32px;
            padding: 28px 24px;
            border: 1px solid #dde7f0;
            margin: 20px 0 24px;
        }
        .question-type {
            display: inline-block;
            background: #667eea15;
            color: #667eea;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.5;
            color: #0b253c;
            margin-bottom: 32px;
        }
        .options-area {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }
        .option-item {
            background: white;
            border: 1.5px solid #d4e0ec;
            border-radius: 26px;
            padding: 16px 22px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .option-item:hover:not(.disabled-option) {
            border-color: #667eea;
            background: #f5faff;
        }
        .option-prefix {
            font-weight: 700;
            background: #eef2f6;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: #2c3e4f;
            flex-shrink: 0;
        }
        .option-item.correct-selected {
            background: #dcfce7;
            border-color: #22c55e;
        }
        .option-item.correct-selected .option-prefix {
            background: #22c55e;
            color: white;
        }
        .option-item.wrong-selected {
            background: #fee2e2;
            border-color: #ef4444;
        }
        .option-item.wrong-selected .option-prefix {
            background: #ef4444;
            color: white;
        }
        .disabled-option {
            pointer-events: none;
        }
        .analysis-box {
            background: #f0f7ff;
            border-radius: 24px;
            padding: 22px;
            margin: 24px 0 16px;
            border-left: 8px solid #667eea;
        }
        .analysis-title {
            font-weight: 700;
            color: #0b2d50;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }
        .action-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
        }
        .btn {
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            background: white;
            border: 1px solid #b9d0e7;
            transition: 0.15s;
            color: #475569;
        }
        .btn:hover {
            background: #f1f5f9;
        }
        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            box-shadow: 0 8px 16px #667eea40;
        }
        .btn-primary:hover {
            background: #5a67d8;
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #94a3b8;
        }
        .refresh-day-btn {
            background: #fbbf24;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 12px;
            font-size: 0.9rem;
            color: #713f12;
        }
        .refresh-day-btn:hover {
            background: #f59e0b;
        }
        .insight-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .stats-card {
            background: white;
            border-radius: 36px;
            padding: 26px 22px;
            border: 1px solid #dde7f0;
            box-shadow: 0 10px 30px -10px #1e293b30;
        }
        .stats-card h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #163a5c;
            border-left: 8px solid #667eea;
            padding-left: 16px;
        }
        .stats-card h3.wrong-title {
            border-left-color: #ef4444;
        }
        .progress-stats {
            background: #eef4ff;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            font-size: 1rem;
            color: #334155;
        }
        .progress-stats span {
            font-weight: 700;
            margin: 0 4px;
        }
        .hot-tip {
            background: #f8f2e7;
            border-radius: 18px;
            padding: 16px;
            margin: 12px 0;
        }
        .hot-tip .tip-title {
            font-weight: 700;
            color: #b45309;
            margin-bottom: 8px;
        }
        .wrong-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .wrong-item {
            background: #fff1f0;
            border: 1px solid #fecaca;
            border-radius: 16px;
            padding: 12px 14px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.15s;
        }
        .wrong-item:hover {
            background: #fee2e2;
        }
        .wrong-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .wrong-item span {
            flex: 1;
            color: #7f1d1d;
            font-size: 0.95rem;
        }
        .clear-wrong-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 12px;
            color: #475569;
        }
        .clear-wrong-btn:hover {
            background: #e2e8f0;
        }
        .date-indicator {
            background: #e6edfa;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #475569;
        }
        .streak-stars {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            justify-content: center;
        }
        .streak-star {
            font-size: 1.5rem;
            opacity: 0.3;
            transition: 0.3s;
        }
        .streak-star.active {
            opacity: 1;
        }
        .mastered-badge {
            display: inline-block;
            background: #22c55e;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 8px;
        }
        .celebration {
            animation: celebrate 0.6s ease;
        }
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #667eea;
            animation: fall 3s linear forwards;
            z-index: 1000;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="quiz-area">
        <div class="subject-header">
            <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <div class="subject-tabs">
                    <button class="subject-tab active" data-subject="15040">💡 15040 新思想</button>
                    <button class="subject-tab" data-subject="15043">📜 15043 近代史</button>
                </div>
                <div class="mode-tabs">
                    <button class="mode-tab active" data-mode="daily">📅 每日闯关</button>
                    <button class="mode-tab" data-mode="all">📚 全部关卡</button>
                </div>
            </div>
            <div style="display: flex; align-items: center;">
                <span class="date-indicator" id="dateIndicator"></span>
                <button class="refresh-day-btn" id="refreshDailyBtn" title="刷新今日题目">🔄 换一组</button>
            </div>
        </div>

        <div id="questionContainer"></div>

        <div class="action-buttons">
            <button class="btn" id="resetSubject">⟲ 重置进度</button>
            <button class="btn btn-primary" id="nextQuestionBtn" disabled>下一题 ▶</button>
        </div>
    </div>

    <div class="insight-panel">
        <div class="stats-card">
            <h3>📊 闯关统计</h3>
            <div class="progress-stats" id="subjectStats">
                <span style="color:#22c55e">已通关: 0</span> | 
                <span style="color:#ef4444">错题: 0</span> | 
                <span style="color:#94a3b8">剩余: 14</span>
            </div>
            <div class="hot-tip">
                <div class="tip-title">🔥 通关提示</div>
                <div id="hotTipContent">每关需连续答对3次才能通关，加油！</div>
            </div>
        </div>

        <div class="stats-card">
            <h3 class="wrong-title">📕 错题本 <span style="font-size:0.9rem; background:#fee2e2; padding:4px 12px; border-radius:30px; margin-left:10px;" id="wrongCount">0</span></h3>
            <div class="wrong-list" id="wrongListContainer"></div>
            <div style="display: flex; gap: 8px; margin-top: 12px;">
                <button class="clear-wrong-btn" id="removeSelectedWrong">🗑️ 移出选中</button>
                <button class="clear-wrong-btn" id="clearWrongBtn">清空全部</button>
            </div>
        </div>
    </div>
</div>

<script>
// ==================== 完整题库 ====================
const fullQuestionBank = [
    // 15040 新思想 14关
    { id: 'po_1', subject: '15040', type: '单选', question: '中国特色社会主义进入新时代的标志是？', options: ['A. 改革开放','B. 党的十八大','C. 党的十九大','D. 新中国成立'], answer: 'B', analysis: '党的十八大(2012年)标志着中国特色社会主义进入新时代。', day: 1 },
    { id: 'po_2', subject: '15040', type: '单选', question: '新时代我国社会主要矛盾是？', options: ['A. 人民日益增长的物质文化需要','B. 人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾','C. 阶级矛盾','D. 经济发展矛盾'], answer: 'B', analysis: '十九大明确指出：人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。', day: 3 },
    { id: 'po_3', subject: '15040', type: '单选', question: '中国梦的核心内涵是？', options: ['A. 个人富裕','B. 中华民族伟大复兴','C. GDP世界第一','D. 科技领先'], answer: 'B', analysis: '中国梦=中华民族伟大复兴。', day: 5 },
    { id: 'po_4', subject: '15040', type: '单选', question: '"五位一体"总体布局包括？', options: ['A. 经济、政治、文化、社会、生态文明建设','B. 经济、政治、军事、文化、社会建设','C. 经济、政治、文化、社会、党的建设','D. 改革、发展、稳定、安全、生态建设'], answer: 'A', analysis: '五位一体=经济建设+政治建设+文化建设+社会建设+生态文明建设。', day: 7 },
    { id: 'po_5', subject: '15040', type: '单选', question: '"四个全面"战略布局中，居于引领地位的是？', options: ['A. 全面建设社会主义现代化国家','B. 全面深化改革','C. 全面依法治国','D. 全面从严治党'], answer: 'A', analysis: '四个全面中，全面建设社会主义现代化国家是战略目标，居于引领地位。', day: 9 },
    { id: 'po_6', subject: '15040', type: '单选', question: '新发展理念的内容是？', options: ['A. 改革、开放、创新、协调、绿色','B. 创新、协调、绿色、开放、共享','C. 民主、法治、公平、正义、安全','D. 富强、民主、文明、和谐、美丽'], answer: 'B', analysis: '新发展理念=创新(第一动力)+协调(内在要求)+绿色(必要条件)+开放(必由之路)+共享(本质要求)。', day: 11 },
    { id: 'po_7', subject: '15040', type: '单选', question: '"十四个坚持"中，排在前三位的是？', options: ['A. 坚持党对一切工作的领导、坚持以人民为中心、坚持全面深化改革','B. 坚持新发展理念、坚持人民当家作主、坚持全面依法治国','C. 坚持社会主义核心价值体系、坚持在发展中保障和改善民生、坚持人与自然和谐共生','D. 坚持总体国家安全观、坚持党对人民军队的绝对领导、坚持"一国两制"'], answer: 'A', analysis: '十四个坚持前三个：坚持党对一切工作的领导、坚持以人民为中心、坚持全面深化改革。', day: 13 },
    
    // 15043 近代史 14关
    { id: 'hi_1', subject: '15043', type: '单选', question: '鸦片战争爆发的时间是？', options: ['A. 1839年','B. 1840年','C. 1842年','D. 1856年'], answer: 'B', analysis: '鸦片战争爆发于1840年6月。', day: 2 },
    { id: 'hi_2', subject: '15043', type: '单选', question: '《南京条约》开放的通商口岸不包括？', options: ['A. 广州','B. 厦门','C. 上海','D. 天津'], answer: 'D', analysis: '《南京条约》开放广州、厦门、福州、宁波、上海五口，不包括天津。', day: 4 },
    { id: 'hi_3', subject: '15043', type: '单选', question: '洋务运动的口号是？', options: ['A. 民主、科学','B. 自强、求富','C. 变法、维新','D. 共和、革命'], answer: 'B', analysis: '洋务运动口号"自强""求富"。', day: 6 },
    { id: 'hi_4', subject: '15043', type: '单选', question: '戊戌变法发生于哪一年？', options: ['A. 1894年','B. 1895年','C. 1898年','D. 1900年'], answer: 'C', analysis: '戊戌变法(百日维新)发生于1898年。', day: 8 },
    { id: 'hi_5', subject: '15043', type: '单选', question: '辛亥革命爆发的时间是？', options: ['A. 1910年10月10日','B. 1911年10月10日','C. 1912年1月1日','D. 1919年5月4日'], answer: 'B', analysis: '辛亥革命爆发于1911年10月10日(武昌起义)。', day: 10 },
    { id: 'hi_6', subject: '15043', type: '单选', question: '五四运动爆发的直接导火索是？', options: ['A. 巴黎和会中国外交失败','B. 辛亥革命失败','C. 甲午战争战败','D. 八国联军侵华'], answer: 'A', analysis: '五四运动(1919年)导火索是巴黎和会中国外交失败。', day: 12 },
    { id: 'hi_7', subject: '15043', type: '单选', question: '新中国成立的时间是？', options: ['A. 1919年','B. 1921年','C. 1949年10月1日','D. 1956年'], answer: 'C', analysis: '1949年10月1日中华人民共和国成立。', day: 14 }
];

// ==================== 状态管理 ====================
const MASTER_THRESHOLD = 3; // 通关需要连续答对次数
let currentSubject = '15040';
let currentMode = 'daily';
let currentQuestionList = [];
let currentIndex = 0;
let answered = false;
let selectedOption = null;

// 从localStorage加载数据
function loadProgress() {
    const data = localStorage.getItem('examPrep_v2');
    if (data) {
        return JSON.parse(data);
    }
    return {};
}

function saveProgress(data) {
    localStorage.setItem('examPrep_v2', JSON.stringify(data));
}

// 获取题目进度
function getQuestionProgress(qid) {
    const all = loadProgress();
    return all[qid] || { streak: 0, mastered: false, errorCount: 0, wrong: false };
}

function updateQuestionProgress(qid, isCorrect) {
    const all = loadProgress();
    const p = all[qid] || { streak: 0, mastered: false, errorCount: 0, wrong: false };
    
    if (isCorrect) {
        p.streak++;
        if (p.streak >= MASTER_THRESHOLD) {
            p.mastered = true;
            p.wrong = false;
        }
    } else {
        p.streak = 0;
        p.errorCount++;
        p.wrong = true;
    }
    
    all[qid] = p;
    saveProgress(all);
    return p;
}

// ==================== 题目加载 ====================
function getTodayString() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadDailyQuestions(subject) {
    const today = getTodayString();
    const storageKey = `daily_${subject}_${today}`;
    let ids = localStorage.getItem(storageKey);
    
    if (!ids) {
        // 随机选7题
        const subjectQs = fullQuestionBank.filter(q => q.subject === subject);
        const shuffled = [...subjectQs].sort(() => Math.random() - 0.5);
        const picked = shuffled.slice(0, 7).map(q => q.id);
        localStorage.setItem(storageKey, JSON.stringify(picked));
        return picked;
    }
    return JSON.parse(ids);
}

function updateCurrentQuestionList() {
    if (currentMode === 'all') {
        currentQuestionList = fullQuestionBank.filter(q => q.subject === currentSubject);
    } else {
        const ids = loadDailyQuestions(currentSubject);
        currentQuestionList = fullQuestionBank.filter(q => q.subject === currentSubject && ids.includes(q.id));
    }
    currentIndex = 0;
    answered = false;
    selectedOption = null;
}

// ==================== 渲染题目 ====================
function renderQuestion() {
    const container = document.getElementById('questionContainer');
    
    if (!currentQuestionList || currentQuestionList.length === 0) {
        container.innerHTML = '<div class="question-card">暂无题目</div>';
        return;
    }
    
    const q = currentQuestionList[currentIndex];
    const progress = getQuestionProgress(q.id);
    const isMastered = progress.mastered;
    
    let optionsHtml = '<div class="options-area">';
    q.options.forEach((opt, idx) => {
        const letter = String.fromCharCode(65 + idx);
        let selectedClass = '';
        if (answered && selectedOption === letter) {
            selectedClass = (letter === q.answer) ? ' correct-selected' : ' wrong-selected';
        }
        optionsHtml += `
            <div class="option-item ${answered ? 'disabled-option' : ''} ${selectedClass}" data-option="${letter}">
                <span class="option-prefix">${letter}</span>
                <span>${opt.substring(3)}</span>
            </div>
        `;
    });
    optionsHtml += '</div>';
    
    // 连对星星
    let starsHtml = '<div class="streak-stars">';
    for (let i = 0; i < MASTER_THRESHOLD; i++) {
        starsHtml += `<span class="streak-star ${i < progress.streak ? 'active' : ''}">⭐</span>`;
    }
    starsHtml += '</div>';
    
    // 解析
    let analysisHtml = '';
    if (answered) {
        const isCorrect = selectedOption === q.answer;
        const statusText = isCorrect ? '✅ 回答正确！' : '❌ 回答错误';
        analysisHtml = `
            <div class="analysis-box">
                <div class="analysis-title">${statusText}</div>
                <div><strong>答案：</strong>${q.answer}</div>
                <div style="margin-top:12px;"><strong>解析：</strong>${q.analysis}</div>
                ${starsHtml}
            </div>
        `;
    } else {
        analysisHtml = starsHtml;
    }
    
    const masteredBadge = isMastered ? '<span class="mastered-badge">🏆 已通关</span>' : '';
    
    container.innerHTML = `
        <div class="question-card ${isMastered ? 'celebration' : ''}" data-question-id="${q.id}">
            <span class="question-type">${q.type} · ${q.subject} · Day ${q.day}</span>
            ${masteredBadge}
            <div class="question-text">${q.question}</div>
            ${optionsHtml}
            ${analysisHtml}
        </div>
    `;
    
    // 更新进度显示
    document.getElementById('dateIndicator').innerText = `${currentIndex + 1} / ${currentQuestionList.length}`;
    
    // 更新按钮
    const nextBtn = document.getElementById('nextQuestionBtn');
    if (currentIndex >= currentQuestionList.length - 1) {
        nextBtn.innerText = '完成 🎉';
    } else {
        nextBtn.innerText = '下一题 ▶';
    }
    nextBtn.disabled = !answered;
}

// ==================== 更新统计 ====================
function updateStats() {
    const subjectQs = fullQuestionBank.filter(q => q.subject === currentSubject);
    let mastered = 0, wrong = 0, remaining = 0;
    
    subjectQs.forEach(q => {
        const p = getQuestionProgress(q.id);
        if (p.mastered) mastered++;
        else if (p.wrong) wrong++;
        else remaining++;
    });
    
    document.getElementById('subjectStats').innerHTML = `
        <span style="color:#22c55e">已通关: ${mastered}</span> | 
        <span style="color:#ef4444">错题: ${wrong}</span> | 
        <span style="color:#94a3b8">剩余: ${remaining}</span>
    `;
    
    // 更新错题本
    const wrongList = subjectQs.filter(q => {
        const p = getQuestionProgress(q.id);
        return p.wrong && !p.mastered;
    });
    
    document.getElementById('wrongCount').innerText = wrongList.length;
    
    const wrongContainer = document.getElementById('wrongListContainer');
    if (wrongList.length === 0) {
        wrongContainer.innerHTML = '<div style="color:#94a3b8; text-align:center; padding:20px;">暂无错题，继续保持！</div>';
    } else {
        wrongContainer.innerHTML = wrongList.map(q => `
            <div class="wrong-item" data-qid="${q.id}">
                <input type="checkbox" class="wrong-checkbox" data-qid="${q.id}">
                <span>Day ${q.day}: ${q.question.substring(0, 20)}...</span>
            </div>
        `).join('');
    }
}

// ==================== 事件绑定 ====================
function setupEvents() {
    // 科目切换
    document.querySelectorAll('.subject-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentSubject = tab.dataset.subject;
            updateCurrentQuestionList();
            renderQuestion();
            updateStats();
        });
    });
    
    // 模式切换
    document.querySelectorAll('.mode-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentMode = tab.dataset.mode;
            updateCurrentQuestionList();
            renderQuestion();
        });
    });
    
    // 选项点击
    document.getElementById('questionContainer').addEventListener('click', (e) => {
        const option = e.target.closest('.option-item');
        if (!option || option.classList.contains('disabled-option')) return;
        
        const q = currentQuestionList[currentIndex];
        selectedOption = option.dataset.option;
        answered = true;
        
        const isCorrect = selectedOption === q.answer;
        const progress = updateQuestionProgress(q.id, isCorrect);
        
        renderQuestion();
        updateStats();
        
        // 通关庆祝
        if (progress.mastered && isCorrect) {
            createConfetti();
        }
    });
    
    // 下一题
    document.getElementById('nextQuestionBtn').addEventListener('click', () => {
        if (currentIndex < currentQuestionList.length - 1) {
            currentIndex++;
            answered = false;
            selectedOption = null;
            renderQuestion();
        } else {
            // 完成
            alert('🎉 恭喜完成今日闯关！');
            currentIndex = 0;
            answered = false;
            selectedOption = null;
            renderQuestion();
        }
    });
    
    // 重置
    document.getElementById('resetSubject').addEventListener('click', () => {
        if (confirm('确定要重置' + currentSubject + '的所有进度吗？')) {
            const all = loadProgress();
            fullQuestionBank.filter(q => q.subject === currentSubject).forEach(q => {
                delete all[q.id];
            });
            saveProgress(all);
            updateCurrentQuestionList();
            renderQuestion();
            updateStats();
        }
    });
    
    // 刷新今日题目
    document.getElementById('refreshDailyBtn').addEventListener('click', () => {
        if (currentMode !== 'daily') return;
        const today = getTodayString();
        localStorage.removeItem(`daily_${currentSubject}_${today}`);
        updateCurrentQuestionList();
        renderQuestion();
    });
    
    // 清空错题
    document.getElementById('clearWrongBtn').addEventListener('click', () => {
        if (confirm('确定清空所有错题吗？')) {
            const all = loadProgress();
            fullQuestionBank.forEach(q => {
                if (all[q.id]) {
                    all[q.id].wrong = false;
                }
            });
            saveProgress(all);
            updateStats();
        }
    });
    
    // 移除选中错题
    document.getElementById('removeSelectedWrong').addEventListener('click', () => {
        const checked = document.querySelectorAll('.wrong-checkbox:checked');
        if (checked.length === 0) {
            alert('请先勾选要移除的错题');
            return;
        }
        const all = loadProgress();
        checked.forEach(cb => {
            const qid = cb.dataset.qid;
            if (all[qid]) {
                all[qid].wrong = false;
            }
        });
        saveProgress(all);
        updateStats();
    });
}

// 彩纸效果
function createConfetti() {
    const colors = ['#667eea', '#764ba2', '#22c55e', '#fbbf24', '#ef4444'];
    for (let i = 0; i < 30; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
    }
}

// ==================== 初始化 ====================
function init() {
    updateCurrentQuestionList();
    renderQuestion();
    updateStats();
    setupEvents();
}

init();
</script>
</body>
</html>
