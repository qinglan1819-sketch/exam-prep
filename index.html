        }

            width: 10px;
            height: 10px;
            background: #667eea;

    </style>
</head>

<script>
// ==================== 完整题库（2科各30题）====================
const fullQuestionBank = [
    // 15040 新思想 30题
    { id: 'po_1', subject: '15040', type: '单选', question: '中国特色社会主义进入新时代的标志是？', options: ['A. 改革开放','B. 党的十八大','C. 党的十九大','D. 新中国成立'], answer: 'B', analysis: '党的十八大(2012年)标志着中国特色社会主义进入新时代。' },
    { id: 'po_2', subject: '15040', type: '单选', question: '新时代我国社会主要矛盾是？', options: ['A. 人民日益增长的物质文化需要','B. 人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾','C. 阶级矛盾','D. 经济发展矛盾'], answer: 'B', analysis: '十九大明确指出：人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。' },
    { id: 'po_3', subject: '15040', type: '单选', question: '中国特色社会主义最本质的特征是？', options: ['A. 改革开放','B. 社会主义市场经济','C. 中国共产党领导','D. 人民民主专政'], answer: 'C', analysis: '中国共产党领导是中国特色社会主义最本质的特征。' },
    { id: 'po_4', subject: '15040', type: '单选', question: '我国发展新的历史方位是？', options: ['A. 社会主义初级阶段','B. 中国特色社会主义新时代','C. 全面建成小康社会','D. 全面建设社会主义现代化国家'], answer: 'B', analysis: '中国特色社会主义新时代是我国发展新的历史方位。' },
    { id: 'po_5', subject: '15040', type: '单选', question: '党的十九大报告提出的"两个没有变"是指？', options: ['A. 我国仍处于并将长期处于社会主义初级阶段的基本国情没有变，我国是世界最大发展中国家的国际地位没有变','B. 我国社会主要矛盾没有变，我国基本国情没有变','C. 我国改革开放政策没有变，我国外交政策没有变','D. 我国经济发展方式没有变，我国产业结构没有变'], answer: 'A', analysis: '"两个没有变"：我国仍处于并将长期处于社会主义初级阶段的基本国情没有变，我国是世界最大发展中国家的国际地位没有变。' },
    { id: 'po_6', subject: '15040', type: '单选', question: '社会主义初级阶段的基本路线是？', options: ['A. 一个中心、两个基本点','B. 四项基本原则','C. 改革开放','D. 以经济建设为中心'], answer: 'A', analysis: '"一个中心、两个基本点"是社会主义初级阶段的基本路线。' },
    { id: 'po_7', subject: '15040', type: '单选', question: '新时代坚持和发展中国特色社会主义的总任务是？', options: ['A. 全面建成小康社会','B. 实现社会主义现代化和中华民族伟大复兴','C. 实现共同富裕','D. 建设社会主义现代化强国'], answer: 'B', analysis: '总任务是实现社会主义现代化和中华民族伟大复兴。' },
    { id: 'po_8', subject: '15040', type: '单选', question: '党的基本路线是党和国家的生命线，这是由什么决定的？', options: ['A. 党的性质','B. 社会主义初级阶段的基本国情','C. 人民的意愿','D. 国际形势'], answer: 'B', analysis: '由社会主义初级阶段的基本国情决定的。' },
    { id: 'po_9', subject: '15040', type: '单选', question: '我国社会主要矛盾的变化是？', options: ['A. 根本性的变化','B. 历史性的变化','C. 关系全局的历史性变化','D. 阶段性的变化'], answer: 'C', analysis: '我国社会主要矛盾的变化是关系全局的历史性变化。' },
    { id: 'po_10', subject: '15040', type: '单选', question: '社会主义初级阶段至少需要多长时间？', options: ['A. 50年','B. 100年','C. 上百年','D. 200年'], answer: 'C', analysis: '社会主义初级阶段至少需要上百年时间。' },
    { id: 'po_11', subject: '15040', type: '单选', question: '中国梦的核心内涵是？', options: ['A. 个人富裕','B. 中华民族伟大复兴','C. GDP世界第一','D. 科技领先'], answer: 'B', analysis: '中国梦=中华民族伟大复兴。' },
    { id: 'po_12', subject: '15040', type: '单选', question: '第二个百年奋斗目标是？', options: ['A. 建党100年全面建成小康社会','B. 建国100年全面建成社会主义现代化强国','C. 建军100年','D. 改革开放100年'], answer: 'B', analysis: '建国100年全面建成社会主义现代化强国。' },
    { id: 'po_13', subject: '15040', type: '单选', question: '第一个百年奋斗目标是？', options: ['A. 建党100年全面建成小康社会','B. 建国100年全面建成社会主义现代化强国','C. 建军100年','D. 改革开放100年'], answer: 'A', analysis: '建党100年全面建成小康社会（已实现）。' },
    { id: 'po_14', subject: '15040', type: '单选', question: '中国梦的本质是？', options: ['A. 国家富强、民族振兴、人民幸福','B. 经济发展、社会进步、文化繁荣','C. 政治民主、生态文明、世界和平','D. 科技创新、教育强国、国防强大'], answer: 'A', analysis: '中国梦的本质是国家富强、民族振兴、人民幸福。' },
    { id: 'po_15', subject: '15040', type: '单选', question: '实现中国梦必须走什么道路？', options: ['A. 资本主义道路','B. 中国特色社会主义道路','C. 民主社会主义道路','D. 新民主主义道路'], answer: 'B', analysis: '实现中国梦必须走中国特色社会主义道路。' },

    { id: 'po_17', subject: '15040', type: '单选', question: '实现中国梦必须凝聚什么力量？', options: ['A. 政府力量','B. 军队力量','C. 中国力量','D. 知识分子力量'], answer: 'C', analysis: '实现中国梦必须凝聚中国力量。' },
    { id: 'po_18', subject: '15040', type: '单选', question: '"两个一百年"奋斗目标中的第一个百年是指？', options: ['A. 2020年','B. 2021年','C. 2035年','D. 2049年'], answer: 'B', analysis: '第一个百年是2021年建党100周年。' },

    { id: 'po_20', subject: '15040', type: '单选', question: '从2035年到本世纪中叶，我国发展的目标是？', options: ['A. 全面建成小康社会','B. 基本实现社会主义现代化','C. 建成富强民主文明和谐美丽的社会主义现代化强国','D. 实现中华民族伟大复兴'], answer: 'C', analysis: '从2035年到本世纪中叶，建成社会主义现代化强国。' },
    { id: 'po_21', subject: '15040', type: '单选', question: '"五位一体"总体布局包括？', options: ['A. 经济、政治、文化、社会、生态文明建设','B. 经济、政治、军事、文化、社会建设','C. 经济、政治、文化、社会、党的建设','D. 改革、发展、稳定、安全、生态建设'], answer: 'A', analysis: '五位一体=经济建设+政治建设+文化建设+社会建设+生态文明建设。' },

    { id: 'po_23', subject: '15040', type: '单选', question: '在"五位一体"中，什么建设是保证？', options: ['A. 经济建设','B. 政治建设','C. 文化建设','D. 生态文明建设'], answer: 'B', analysis: '政治建设是保证。' },
    { id: 'po_24', subject: '15040', type: '单选', question: '在"五位一体"中，什么建设是灵魂？', options: ['A. 经济建设','B. 政治建设','C. 文化建设','D. 社会建设'], answer: 'C', analysis: '文化建设是灵魂。' },

// ==================== 状态管理 ====================
const MASTER_THRESHOLD = 1; // 单次答对即通过
let currentSubject = '15040';
let currentMode = 'daily';
let currentQuestionList = [];
let currentIndex = 0;
let answered = false;
let selectedOption = null;

// 从localStorage加载数据
function loadProgress() {
    const data = localStorage.getItem('examPrep_v2');
    if (data) {
        return JSON.parse(data);
    }
    return {};
}

function saveProgress(data) {
    localStorage.setItem('examPrep_v2', JSON.stringify(data));
}

// 获取题目进度
function getQuestionProgress(qid) {
    const all = loadProgress();
    return all[qid] || { streak: 0, mastered: false, errorCount: 0, wrong: false };
}

function updateQuestionProgress(qid, isCorrect) {
    const all = loadProgress();
    const p = all[qid] || { streak: 0, mastered: false, errorCount: 0, wrong: false };
    
    if (isCorrect) {
        p.streak++;
        if (p.streak >= MASTER_THRESHOLD) {
            p.mastered = true;
            p.wrong = false;
        }
    } else {
        p.streak = 0;
        p.errorCount++;
        p.wrong = true;
    }
    
    all[qid] = p;
    saveProgress(all);
    return p;
}

// ==================== 题目加载 ====================
function getTodayString() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadDailyQuestions(subject) {
    const today = getTodayString();
    const storageKey = `daily_${subject}_${today}`;
    let ids = localStorage.getItem(storageKey);
    
    if (!ids) {
        // 随机选7题
        const subjectQs = fullQuestionBank.filter(q => q.subject === subject);
        const shuffled = [...subjectQs].sort(() => Math.random() - 0.5);
        const picked = shuffled.slice(0, 7).map(q => q.id);
        localStorage.setItem(storageKey, JSON.stringify(picked));
        return picked;
    }
    return JSON.parse(ids);
}

function updateCurrentQuestionList() {
    if (currentMode === 'all') {
        currentQuestionList = fullQuestionBank.filter(q => q.subject === currentSubject);
    } else {
        const ids = loadDailyQuestions(currentSubject);
        currentQuestionList = fullQuestionBank.filter(q => q.subject === currentSubject && ids.includes(q.id));
    }
    currentIndex = 0;
    answered = false;
    selectedOption = null;
}

// ==================== 渲染题目 ====================
function renderQuestion() {
    const container = document.getElementById('questionContainer');
    
    if (!currentQuestionList || currentQuestionList.length === 0) {
        container.innerHTML = '<div class="question-card">暂无题目</div>';
        return;
    }
    
    const q = currentQuestionList[currentIndex];
    const progress = getQuestionProgress(q.id);
    const isMastered = progress.mastered;
    
    let optionsHtml = '<div class="options-area">';
    q.options.forEach((opt, idx) => {
        const letter = String.fromCharCode(65 + idx);
        let selectedClass = '';
        if (answered && selectedOption === letter) {
            selectedClass = (letter === q.answer) ? ' correct-selected' : ' wrong-selected';
        }
        optionsHtml += `
            <div class="option-item ${answered ? 'disabled-option' : ''} ${selectedClass}" data-option="${letter}">
                <span class="option-prefix">${letter}</span>
                <span>${opt.substring(3)}</span>
            </div>
        `;
    });
    optionsHtml += '</div>';
    
    // 连对星星（已通关显示🏆）
    let starsHtml = '';
    if (progress.mastered) {
        starsHtml = '<div style="text-align:center; margin-top:10px; color:#22c55e; font-weight:600;">🏆 已通关</div>';
    }
    
    // 解析
    let analysisHtml = '';
    if (answered) {
        const isCorrect = selectedOption === q.answer;
        const statusText = isCorrect ? '✅ 回答正确！' : '❌ 回答错误';
        analysisHtml = `
            <div class="analysis-box">
                <div class="analysis-title">${statusText}</div>
                <div><strong>答案：</strong>${q.answer}</div>
                <div style="margin-top:12px;"><strong>解析：</strong>${q.analysis}</div>
                ${starsHtml}
            </div>
        `;
    } else {
        analysisHtml = starsHtml;
    }
    
    const masteredBadge = isMastered ? '<span class="mastered-badge">✅ 已通关</span>' : '';
    
    container.innerHTML = `
        <div class="question-card ${isMastered ? 'celebration' : ''}" data-question-id="${q.id}">
            <span class="question-type">${q.type} · ${q.subject}</span>
            ${masteredBadge}
            <div class="question-text">${q.question}</div>
            ${optionsHtml}
            ${analysisHtml}
        </div>
    `;
    
    // 更新进度显示
    document.getElementById('dateIndicator').innerText = `${currentIndex + 1} / ${currentQuestionList.length}`;
    
    // 更新按钮
    const nextBtn = document.getElementById('nextQuestionBtn');
    if (currentIndex >= currentQuestionList.length - 1) {
        nextBtn.innerText = '完成 🎉';
    } else {
        nextBtn.innerText = '下一题 ▶';
    }
    nextBtn.disabled = !answered;
}

// ==================== 更新统计 ====================
function updateStats() {
    const subjectQs = fullQuestionBank.filter(q => q.subject === currentSubject);
    let mastered = 0, wrong = 0, remaining = 0;
    
    subjectQs.forEach(q => {
        const p = getQuestionProgress(q.id);
        if (p.mastered) mastered++;
        else if (p.wrong) wrong++;
        else remaining++;
    });
    
    document.getElementById('subjectStats').innerHTML = `
        <span style="color:#22c55e">已通关: ${mastered}</span> | 
        <span style="color:#ef4444">错题: ${wrong}</span> | 
        <span style="color:#94a3b8">剩余: ${remaining}</span>
    `;
    
    // 更新错题本
    const wrongList = subjectQs.filter(q => {
        const p = getQuestionProgress(q.id);
        return p.wrong && !p.mastered;
    });
    
    document.getElementById('wrongCount').innerText = wrongList.length;
    
    const wrongContainer = document.getElementById('wrongListContainer');
    if (wrongList.length === 0) {
        wrongContainer.innerHTML = '<div style="color:#94a3b8; text-align:center; padding:20px;">暂无错题，继续保持！</div>';
    } else {
        wrongContainer.innerHTML = wrongList.map(q => `
            <div class="wrong-item" data-qid="${q.id}">
                <input type="checkbox" class="wrong-checkbox" data-qid="${q.id}">
                <span>${q.subject}: ${q.question.substring(0, 20)}...</span>
            </div>
        `).join('');
    }
}

// ==================== 事件绑定 ====================
function setupEvents() {
    // 科目切换
    document.querySelectorAll('.subject-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentSubject = tab.dataset.subject;
            updateCurrentQuestionList();
            renderQuestion();
            updateStats();
        });
    });
    
    // 模式切换
    document.querySelectorAll('.mode-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentMode = tab.dataset.mode;
            updateCurrentQuestionList();
            renderQuestion();
        });
    });
    
    // 选项点击
    document.getElementById('questionContainer').addEventListener('click', (e) => {
        const option = e.target.closest('.option-item');
        if (!option || option.classList.contains('disabled-option')) return;
        
        const q = currentQuestionList[currentIndex];
        selectedOption = option.dataset.option;
        answered = true;
        
        const isCorrect = selectedOption === q.answer;
        const progress = updateQuestionProgress(q.id, isCorrect);
        
        renderQuestion();
        updateStats();
        
        // 通关庆祝
        if (progress.mastered && isCorrect) {
            createConfetti();
        }
    });
    
    // 下一题
    document.getElementById('nextQuestionBtn').addEventListener('click', () => {
        if (currentIndex < currentQuestionList.length - 1) {
            currentIndex++;
            answered = false;
            selectedOption = null;
            renderQuestion();
        } else {
            // 完成
            alert('🎉 恭喜完成今日闯关！');
            currentIndex = 0;
            answered = false;
            selectedOption = null;
            renderQuestion();
        }
    });
    
    // 重置
    document.getElementById('resetSubject').addEventListener('click', () => {
        if (confirm('确定要重置' + currentSubject + '的所有进度吗？')) {
            const all = loadProgress();
            fullQuestionBank.filter(q => q.subject === currentSubject).forEach(q => {
                delete all[q.id];
            });
            saveProgress(all);
            updateCurrentQuestionList();
            renderQuestion();
            updateStats();
        }
    });
    
    // 刷新今日题目
    document.getElementById('refreshDailyBtn').addEventListener('click', () => {
        if (currentMode !== 'daily') return;
        const today = getTodayString();
        localStorage.removeItem(`daily_${currentSubject}_${today}`);
        updateCurrentQuestionList();
        renderQuestion();
    });
    
    // 清空错题
    document.getElementById('clearWrongBtn').addEventListener('click', () => {
        if (confirm('确定清空所有错题吗？')) {
            const all = loadProgress();
            fullQuestionBank.forEach(q => {
                if (all[q.id]) {
                    all[q.id].wrong = false;
                }
            });
            saveProgress(all);
            updateStats();
        }
    });
    
    // 移除选中错题
    document.getElementById('removeSelectedWrong').addEventListener('click', () => {
        const checked = document.querySelectorAll('.wrong-checkbox:checked');
        if (checked.length === 0) {
            alert('请先勾选要移除的错题');
            return;
        }
        const all = loadProgress();
        checked.forEach(cb => {
            const qid = cb.dataset.qid;
            if (all[qid]) {
                all[qid].wrong = false;
            }
        });
        saveProgress(all);
        updateStats();
    });
}

// 彩纸效果
function createConfetti() {
    const colors = ['#667eea', '#764ba2', '#22c55e', '#fbbf24', '#ef4444'];
    for (let i = 0; i < 30; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
    }
}

function init() {
    updateCurrentQuestionList();
    renderQuestion();
    updateStats();
