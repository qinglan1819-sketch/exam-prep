<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annie的14天自考闯关系统（新思想+近代史）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #f093fb;
            --success: #48bb78;
            --danger: #f56565;
            --warning: #ed8936;
            --bg-dark: #1a202c;
            --bg-card: #2d3748;
            --text-light: #e2e8f0;
            --text-muted: #a0aec0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-light);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .stat-item .number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--success);
        }
        
        .stat-item .label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        /* 导航标签 */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .nav-tab {
            background: var(--bg-card);
            border: none;
            color: var(--text-light);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .nav-tab:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }
        
        .nav-tab.active {
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        /* 内容区域 */
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 闯关地图 */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .subject-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .subject-card:hover {
            transform: translateY(-5px);
        }
        
        .subject-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .subject-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .subject-icon.english-writing { background: linear-gradient(135deg, #667eea, #764ba2); }
        .subject-icon.translation { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .subject-icon.politics { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .subject-icon.history { background: linear-gradient(135deg, #fa709a, #fee140); }
        
        .subject-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        
        .subject-info .code {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.1);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--primary));
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .progress-text {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        
        .level-node {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .level-node.locked {
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
        }
        
        .level-node.available {
            background: var(--primary);
            color: white;
        }
        
        .level-node.completed {
            background: var(--success);
            color: white;
        }
        
        .level-node.mastered {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
        }
        
        .level-node:hover {
            transform: scale(1.1);
        }
        
        /* 复习界面 */
        .review-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .review-header h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .review-count {
            display: inline-block;
            background: var(--warning);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .review-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .review-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .review-info {
            flex: 1;
        }
        
        .review-info h4 {
            margin-bottom: 5px;
        }
        
        .review-info .subject-tag {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-right: 8px;
        }
        
        .review-info .interval-tag {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            color: var(--text-muted);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: var(--success);
        }
        
        .btn-success:hover {
            background: #38a169;
        }
        
        .btn-danger {
            background: var(--danger);
        }
        
        /* 薄弱点 */
        .weak-points-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .weak-point-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid var(--danger);
        }
        
        .weak-point-card h4 {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .weak-point-card .error-count {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }
        
        .weak-point-card .subject-name {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        
        .streak-indicator {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        
        .streak-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        
        .streak-dot.active {
            background: var(--success);
        }
        
        /* 统计报告 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        
        .stat-card .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 5px;
        }
        
        .stat-card .label {
            color: var(--text-muted);
        }
        
        .chart-container {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .chart-container h3 {
            margin-bottom: 20px;
        }
        
        .simple-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 200px;
            gap: 10px;
        }
        
        .chart-bar {
            flex: 1;
            background: linear-gradient(to top, var(--primary), var(--secondary));
            border-radius: 4px 4px 0 0;
            min-height: 20px;
            position: relative;
            transition: all 0.3s;
        }
        
        .chart-bar:hover {
            opacity: 0.8;
        }
        
        .chart-bar .bar-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }
        
        .chart-bar .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        /* 答题模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            font-size: 1.3rem;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .question-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .question-card h4 {
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option-item {
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .option-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
        }
        
        .option-item.correct {
            background: rgba(72, 187, 120, 0.2);
            border-color: var(--success);
        }
        
        .option-item.wrong {
            background: rgba(245, 101, 101, 0.2);
            border-color: var(--danger);
        }
        
        .option-item.disabled {
            pointer-events: none;
        }
        
        .streak-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        
        .streak-display span {
            color: var(--text-muted);
        }
        
        .streak-stars {
            display: flex;
            gap: 5px;
        }
        
        .streak-star {
            font-size: 1.5rem;
            color: var(--text-muted);
            transition: all 0.3s;
        }
        
        .streak-star.active {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .feedback-msg {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
        }
        
        .feedback-msg.success {
            background: rgba(72, 187, 120, 0.2);
            color: var(--success);
        }
        
        .feedback-msg.error {
            background: rgba(245, 101, 101, 0.2);
            color: var(--danger);
        }
        
        .feedback-msg.mastered {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 237, 78, 0.2));
            color: #ffd700;
        }
        
        /* 艾宾浩斯说明 */
        .ebbinghaus-info {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .ebbinghaus-info h4 {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ebbinghaus-info p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.9rem;
        }
        
        .ebbinghaus-schedule {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .schedule-item {
            background: var(--bg-card);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        
        .schedule-item.current {
            background: var(--warning);
            color: white;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .level-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            
            .nav-tab {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
        }
        
        /* 动画 */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.5s;
        }
        
        @keyframes celebrate {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-5deg); }
            50% { transform: scale(1.2) rotate(5deg); }
            75% { transform: scale(1.1) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        
        .celebrate {
            animation: celebrate 0.5s ease;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
        }
        
        /* 复习计划表 */
        .schedule-table {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }
        
        .schedule-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .schedule-table th,
        .schedule-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .schedule-table th {
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-weight: normal;
        }
        
        .schedule-table tr:last-child td {
            border-bottom: none;
        }
        
        .day-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        
        /* 重置按钮 */
        .reset-section {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn-reset {
            background: transparent;
            border: 2px solid var(--danger);
            color: var(--danger);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .btn-reset:hover {
            background: var(--danger);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Annie的14天自考闯关系统</h1>
            <p>15040新思想 + 15043近代史纲要 | 每天一关，轻松通关</p>
        </header>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="number" id="totalProgress">0%</div>
                <div class="label">总体进度</div>
            </div>
            <div class="stat-item">
                <div class="number" id="masteredCount">0</div>
                <div class="label">已通关考点</div>
            </div>
            <div class="stat-item">
                <div class="number" id="todayReview">0</div>
                <div class="label">今日复习</div>
            </div>
            <div class="stat-item">
                <div class="number" id="streakDays">1</div>
                <div class="label">连续打卡</div>
            </div>
        </div>
        
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showSection('map')">🗺️ 闯关地图</button>
            <button class="nav-tab" onclick="showSection('review')">📚 今日复习</button>
            <button class="nav-tab" onclick="showSection('weak')">⚠️ 薄弱点</button>
            <button class="nav-tab" onclick="showSection('stats')">📊 统计报告</button>
        </div>
        
        <!-- 闯关地图 -->
        <div id="section-map" class="content-section active">
            <div class="subjects-grid" id="subjectsGrid"></div>
        </div>
        
        <!-- 今日复习 -->
        <div id="section-review" class="content-section">
            <div class="ebbinghaus-info">
                <h4>🧠 艾宾浩斯遗忘曲线复习计划</h4>
                <p>根据遗忘规律，在特定时间点复习可以最大程度巩固记忆。系统会自动安排第1、2、4、7、15天的复习。</p>
                <div class="ebbinghaus-schedule">
                    <span class="schedule-item">第1天</span>
                    <span class="schedule-item">第2天</span>
                    <span class="schedule-item">第4天</span>
                    <span class="schedule-item">第7天</span>
                    <span class="schedule-item">第15天</span>
                </div>
            </div>
            <div class="review-header">
                <h2>今日待复习</h2>
                <span class="review-count" id="reviewCount">0 个考点</span>
            </div>
            <div class="review-list" id="reviewList"></div>
        </div>
        
        <!-- 薄弱点 -->
        <div id="section-weak" class="content-section">
            <div class="weak-points-grid" id="weakPointsGrid"></div>
        </div>
        
        <!-- 统计报告 -->
        <div id="section-stats" class="content-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon">📝</div>
                    <div class="value" id="statTotal">0</div>
                    <div class="label">总考点数</div>
                </div>
                <div class="stat-card">
                    <div class="icon">✅</div>
                    <div class="value" id="statCompleted">0</div>
                    <div class="label">已完成</div>
                </div>
                <div class="stat-card">
                    <div class="icon">🎯</div>
                    <div class="value" id="statAccuracy">0%</div>
                    <div class="label">正确率</div>
                </div>
                <div class="stat-card">
                    <div class="icon">🔥</div>
                    <div class="value" id="statStreak">0</div>
                    <div class="label">最高连对</div>
                </div>
            </div>
            
            <div class="chart-container">
                <h3>📈 各科进度</h3>
                <div class="simple-chart" id="progressChart"></div>
            </div>
            
            <div class="chart-container">
                <h3>📅 27天复习计划表</h3>
                <div class="schedule-table">
                    <table id="scheduleTable">
                        <thead>
                            <tr>
                                <th>天数</th>
                                <th>新学考点</th>
                                <th>复习考点</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="reset-section">
                <button class="btn-reset" onclick="resetAllData()">🗑️ 重置所有数据</button>
            </div>
        </div>
    </div>
    
    <!-- 答题模态框 -->
    <div class="modal-overlay" id="quizModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="quizTitle">关卡挑战</h3>

    <script>
        // ==================== 数据配置 ====================
        // 27天自考闯关题库 - 4科，每科7关，共28关
        const SUBJECTS = [
            {
                id: 'politics',

                levels: [
                    { id: 'po_1', name: 'Day1', title: '新时代与主要矛盾', question: '中国特色社会主义进入新时代的标志是？新时代我国社会主要矛盾是？', options: ['改革开放，物质文化需要', '党的十八大，美好生活需要 vs 不平衡不充分发展', '党的十九大，阶级矛盾', '新中国成立，经济发展矛盾'], answer: 1, explanation: '党的十八大标志进入新时代；主要矛盾转化为人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。' },
                    { id: 'po_2', name: 'Day3', title: '中国梦与两个百年', question: '中国梦的核心内涵是？第二个百年奋斗目标是？', options: ['个人富裕，建党100年', '中华民族伟大复兴，建国100年全面建成社会主义现代化强国', 'GDP世界第一，建军100年', '科技领先，改革开放100年'], answer: 1, explanation: '中国梦=中华民族伟大复兴；两个百年目标分别是建党100年全面建成小康社会，建国100年全面建成社会主义现代化强国。' },
                    { id: 'po_3', name: 'Day5', title: '五位一体总体布局', question: '"五位一体"总体布局包括？', options: ['经济、政治、文化、社会、生态文明建设', '经济、政治、军事、文化、社会建设', '经济、政治、文化、社会、党的建设', '改革、发展、稳定、安全、生态建设'], answer: 0, explanation: '五位一体=经济建设+政治建设+文化建设+社会建设+生态文明建设。' },
                    { id: 'po_4', name: 'Day7', title: '四个全面战略布局', question: '"四个全面"战略布局中，居于引领地位的是？', options: ['全面建设社会主义现代化国家', '全面深化改革', '全面依法治国', '全面从严治党'], answer: 0, explanation: '四个全面中，全面建设社会主义现代化国家是战略目标，居于引领地位。' },
                    { id: 'po_5', name: 'Day9', title: '新发展理念', question: '新发展理念的内容是？', options: ['改革、开放、创新、协调、绿色', '创新、协调、绿色、开放、共享', '民主、法治、公平、正义、安全', '富强、民主、文明、和谐、美丽'], answer: 1, explanation: '新发展理念=创新(第一动力)+协调(内在要求)+绿色(必要条件)+开放(必由之路)+共享(本质要求)。' },
                    { id: 'po_6', name: 'Day11', title: '全面深化改革', question: '全面深化改革的总目标是？', options: ['完善和发展中国特色社会主义制度，推进国家治理体系和治理能力现代化', '实现GDP翻番', '建成小康社会', '实现共同富裕'], answer: 0, explanation: '全面深化改革总目标是完善和发展中国特色社会主义制度、推进国家治理体系和治理能力现代化。' },
                    { id: 'po_7', name: 'Day13', title: '新思想核心要点', question: '"十四个坚持"中，排在前三位的是？', options: ['坚持党对一切工作的领导、坚持以人民为中心、坚持全面深化改革', '坚持新发展理念、坚持人民当家作主、坚持全面依法治国', '坚持社会主义核心价值体系、坚持在发展中保障和改善民生、坚持人与自然和谐共生', '坚持总体国家安全观、坚持党对人民军队的绝对领导、坚持"一国两制"'], answer: 0, explanation: '十四个坚持前三个：坚持党对一切工作的领导、坚持以人民为中心、坚持全面深化改革。' }
                ]
            },
            {
                id: 'history',
                code: '15043',
                name: '近代史',
                icon: '📜',
                color: 'history',
                levels: [
                    { id: 'hi_1', name: 'Day2', title: '鸦片战争与南京条约', question: '鸦片战争爆发的时间是？《南京条约》开放的通商口岸不包括？', options: ['1839年，广州', '1840年，天津', '1842年，上海', '1856年，厦门'], answer: 1, explanation: '鸦片战争爆发于1840年；《南京条约》开放广州、厦门、福州、宁波、上海五口，不包括天津。' },
                    { id: 'hi_2', name: 'Day4', title: '洋务运动与戊戌变法', question: '洋务运动的口号是？戊戌变法发生于哪一年？', options: ['民主、科学，1894年', '自强、求富，1898年', '变法、维新，1895年', '共和、革命，1900年'], answer: 1, explanation: '洋务运动口号"自强""求富"；戊戌变法(百日维新)发生于1898年。' },
                    { id: 'hi_3', name: 'Day6', title: '辛亥革命', question: '辛亥革命爆发的时间是？其历史意义是？', options: ['1910年10月10日，结束封建统治', '1911年10月10日，推翻清朝，建立共和', '1912年1月1日，统一中国', '1919年5月4日，开启新民主主义革命'], answer: 1, explanation: '辛亥革命爆发于1911年10月10日(武昌起义)，推翻了清朝统治，结束了两千多年封建帝制，建立了中华民国。' },
                    { id: 'hi_4', name: 'Day8', title: '五四运动与中共成立', question: '五四运动爆发的直接导火索是？中国共产党成立的时间是？', options: ['巴黎和会中国外交失败，1921年', '辛亥革命失败，1919年', '甲午战争战败，1920年', '八国联军侵华，1922年'], answer: 0, explanation: '五四运动(1919年)导火索是巴黎和会中国外交失败；中共一大1921年7月召开，标志中国共产党成立。' },
                    { id: 'hi_5', name: 'Day10', title: '抗日战争', question: '中国人民抗日战争胜利纪念日是？抗战持续了多少年？', options: ['8月15日，8年', '9月2日，14年', '9月3日，14年', '10月1日，8年'], answer: 2, explanation: '抗战胜利纪念日是9月3日；从1931年九一八事变到1945年日本投降，共14年。' },
                    { id: 'hi_6', name: 'Day12', title: '解放战争与新中国成立', question: '新中国成立的时间是？其历史意义是？', options: ['1919年，新民主主义革命开端', '1921年，中国共产党成立', '1949年10月1日，中国人民站起来', '1956年，社会主义制度确立'], answer: 2, explanation: '1949年10月1日中华人民共和国成立，标志着中国人民从此站起来了，开辟了中国历史新纪元。' },
                    { id: 'hi_7', name: 'Day14', title: '近代史综合', question: '中国近代史(1840-1949)的两大历史任务是？', options: ['反帝反封建，实现现代化', '求得民族独立和人民解放，实现国家富强和人民富裕', '建立共和国，发展资本主义', '学习西方，变法图强'], answer: 1, explanation: '中国近代史两大历史任务：一是求得民族独立和人民解放(反帝反封建)，二是实现国家富强和人民富裕(现代化)。' }
                ]
            }
        ];

        // 艾宾浩斯复习间隔（天数）
        const EBBINGHAUS_INTERVALS = [1, 2, 4, 7, 15];
        
        // 通关所需连续正确次数
        const MASTER_THRESHOLD = 3;

        // ==================== 数据管理 ====================
        function getStorageKey() {
            return 'examPrep_' + new Date().getFullYear() + '_v1';
        }

        function loadData() {
            const data = localStorage.getItem(getStorageKey());
            if (data) {
                return JSON.parse(data);
            }
            return initializeData();
        }

        function saveData(data) {
            localStorage.setItem(getStorageKey(), JSON.stringify(data));
        }

        function initializeData() {
            const startDate = new Date();
            startDate.setHours(0, 0, 0, 0);
            
            const progress = {};
            SUBJECTS.forEach(subject => {
                subject.levels.forEach(level => {
                    progress[level.id] = {
                        streak: 0,
                        mastered: false,
                        firstLearned: null,
                        lastReviewed: null,
                        reviewCount: 0,
                        errorCount: 0,
                        reviews: [] // 记录每次复习时间
                    };
                });
            });
            
            return {
                startDate: startDate.toISOString(),
                lastCheckIn: null,
                streakDays: 0,
                totalAttempts: 0,
                correctAttempts: 0,
                progress: progress
            };
        }

        // ==================== 全局状态 ====================
        let appData = loadData();
        let currentQuiz = null;
        let currentQuestion = null;

        // ==================== 核心逻辑 ====================
        
        // 计算今日需要复习的考点
        function getTodayReviews() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const startDate = new Date(appData.startDate);
            const dayDiff = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            
            const reviews = [];
            
            SUBJECTS.forEach(subject => {
                subject.levels.forEach(level => {
                    const p = appData.progress[level.id];
                    
                    // 如果已通关，按艾宾浩斯安排复习
                    if (p.mastered && p.firstLearned) {
                        const firstLearned = new Date(p.firstLearned);
                        
                        for (const interval of EBBINGHAUS_INTERVALS) {
                            const reviewDate = new Date(firstLearned);
                            reviewDate.setDate(reviewDate.getDate() + interval);
                            reviewDate.setHours(0, 0, 0, 0);
                            
                            // 检查是否今天需要复习且尚未复习
                            if (reviewDate.getTime() === today.getTime()) {
                                const alreadyReviewed = p.reviews.some(r => {
                                    const rDate = new Date(r);
                                    rDate.setHours(0, 0, 0, 0);
                                    return rDate.getTime() === today.getTime();
                                });
                                
                                if (!alreadyReviewed) {
                                    reviews.push({
                                        level: level,
                                        subject: subject,
                                        type: 'scheduled',
                                        interval: interval
                                    });
                                }
                                break;
                            }
                        }
                    }
                    // 未通关但需要复习（答错过）
                    else if (!p.mastered && p.errorCount > 0) {
                        const lastReview = p.lastReviewed ? new Date(p.lastReviewed) : null;
                        if (!lastReview || (today - lastReview) >= 24 * 60 * 60 * 1000) {
                            reviews.push({
                                level: level,
                                subject: subject,
                                type: 'weak',
                                interval: null
                            });
                        }
                    }
                });
            });
            
            return reviews;
        }

        // 获取薄弱点
        function getWeakPoints() {
            const weakPoints = [];
            
            SUBJECTS.forEach(subject => {
                subject.levels.forEach(level => {
                    const p = appData.progress[level.id];
                    if (p.errorCount > 0 || (!p.mastered && p.streak < MASTER_THRESHOLD && p.streak > 0)) {
                        weakPoints.push({
                            level: level,
                            subject: subject,
                            progress: p
                        });
                    }
                });
            });
            
            // 按错误次数排序
            weakPoints.sort((a, b) => b.progress.errorCount - a.progress.errorCount);
            return weakPoints;
        }

        // 检查并更新打卡
        function checkIn() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            if (appData.lastCheckIn) {
                const lastCheck = new Date(appData.lastCheckIn);
                lastCheck.setHours(0, 0, 0, 0);
                
                const diffDays = Math.floor((today - lastCheck) / (1000 * 60 * 60 * 24));
                
                if (diffDays === 1) {
                    appData.streakDays++;
                    appData.lastCheckIn = today.toISOString();
                    saveData(appData);
                } else if (diffDays > 1) {
                    appData.streakDays = 1;
                    appData.lastCheckIn = today.toISOString();
                    saveData(appData);
                }
            } else {
                appData.streakDays = 1;
                appData.lastCheckIn = today.toISOString();
                saveData(appData);
            }
        }

        // ==================== UI 渲染 ====================
        
        function renderStatsBar() {
            const totalLevels = SUBJECTS.reduce((sum, s) => sum + s.levels.length, 0);
            const mastered = Object.values(appData.progress).filter(p => p.mastered).length;
            const todayReviews = getTodayReviews();
            
            document.getElementById('totalProgress').textContent = Math.round((mastered / totalLevels) * 100) + '%';
            document.getElementById('masteredCount').textContent = mastered;
            document.getElementById('todayReview').textContent = todayReviews.length;
            document.getElementById('streakDays').textContent = appData.streakDays || 1;
        }

        function renderSubjects() {
            const grid = document.getElementById('subjectsGrid');
            grid.innerHTML = '';
            
            SUBJECTS.forEach(subject => {
                const mastered = subject.levels.filter(l => appData.progress[l.id].mastered).length;
                const progress = Math.round((mastered / subject.levels.length) * 100);
                
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.innerHTML = `
                    <div class="subject-header">
                        <div class="subject-icon ${subject.color}">${subject.icon}</div>
                        <div class="subject-info">
                            <h3>${subject.name}</h3>
                            <div class="code">科目代码: ${subject.code}</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                    <div class="progress-text">${mastered}/${subject.levels.length} 关卡已通关 (${progress}%)</div>
                    <div class="level-grid">
                        ${subject.levels.map((level, idx) => {
                            const p = appData.progress[level.id];
                            let status = 'locked';
                            if (p.mastered) status = 'mastered';
                            else if (p.streak > 0 || idx === 0 || appData.progress[subject.levels[idx-1]?.id]?.mastered) status = 'available';
                            if (idx > 0 && !appData.progress[subject.levels[idx-1]?.id]?.mastered && !p.streak) status = 'locked';
                            
                            return `<div class="level-node ${status}" onclick="startQuiz('${subject.id}', '${level.id}')" title="${level.title}">${level.name}</div>`;
                        }).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderReview() {
            const reviews = getTodayReviews();
            const list = document.getElementById('reviewList');
            document.getElementById('reviewCount').textContent = reviews.length + ' 个考点';
            
            if (reviews.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎉</div>
                        <h3>今日没有待复习的考点</h3>
                        <p>你已经完成了今天的复习任务，继续加油！</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = reviews.map(r => `
                <div class="review-item">
                    <div class="review-info">
                        <h4>${r.level.title}</h4>
                        <span class="subject-tag">${r.subject.name}</span>
                        ${r.type === 'scheduled' ? `<span class="interval-tag">第${r.interval}天复习</span>` : '<span class="interval-tag">薄弱点强化</span>'}
                    </div>
                    <button class="btn" onclick="startQuiz('${r.subject.id}', '${r.level.id}')">开始复习</button>
                </div>
            `).join('');
        }

        function renderWeakPoints() {
            const weakPoints = getWeakPoints();
            const grid = document.getElementById('weakPointsGrid');
            
            if (weakPoints.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="icon">🌟</div>
                        <h3>暂时没有薄弱点</h3>
                        <p>你的学习状态很好，继续保持！</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = weakPoints.map(wp => `
                <div class="weak-point-card">
                    <h4>
                        ${wp.level.title}
                        ${wp.progress.errorCount > 0 ? `<span class="error-count">${wp.progress.errorCount} 次错误</span>` : ''}
                    </h4>
                    <div class="subject-name">${wp.subject.name} · 第${wp.level.name}关</div>
                    <div>当前连对: ${wp.progress.streak}/${MASTER_THRESHOLD}</div>
                    <div class="streak-indicator">
                        ${[0, 1, 2].map(i => `<div class="streak-dot ${i < wp.progress.streak ? 'active' : ''}"></div>`).join('')}
                    </div>
                    <button class="btn" style="margin-top: 15px; width: 100%;" onclick="startQuiz('${wp.subject.id}', '${wp.level.id}')">强化练习</button>
                </div>
            `).join('');
        }

        function renderStats() {
            const totalLevels = SUBJECTS.reduce((sum, s) => sum + s.levels.length, 0);
            const mastered = Object.values(appData.progress).filter(p => p.mastered).length;
            const accuracy = appData.totalAttempts > 0 
                ? Math.round((appData.correctAttempts / appData.totalAttempts) * 100) 
                : 0;
            
            document.getElementById('statTotal').textContent = totalLevels;
            document.getElementById('statCompleted').textContent = mastered;
            document.getElementById('statAccuracy').textContent = accuracy + '%';
            
            // 计算最高连对
            let maxStreak = 0;
            Object.values(appData.progress).forEach(p => {
                if (p.streak > maxStreak) maxStreak = p.streak;
            });
            document.getElementById('statStreak').textContent = maxStreak;
            
            // 渲染进度图表
            const chart = document.getElementById('progressChart');
            chart.innerHTML = SUBJECTS.map(subject => {
                const mastered = subject.levels.filter(l => appData.progress[l.id].mastered).length;
                const percent = (mastered / subject.levels.length) * 100;
                return `
                    <div class="chart-bar" style="height: ${Math.max(percent, 5)}%">
                        <div class="bar-value">${mastered}/${subject.levels.length}</div>
                        <div class="bar-label">${subject.icon}</div>
                    </div>
                `;
            }).join('');
            
            // 渲染27天计划表
            renderScheduleTable();
        }

        function renderScheduleTable() {
            const tbody = document.getElementById('scheduleBody');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const startDate = new Date(appData.startDate);
            const currentDay = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            
            // 14天学习计划表（两科：新思想+近代史）
            const plan = [
                { day: 1, subject: '新思想', title: '新时代与主要矛盾' },
                { day: 2, subject: '近代史', title: '鸦片战争与南京条约' },
                { day: 3, subject: '新思想', title: '中国梦与两个百年' },
                { day: 4, subject: '近代史', title: '洋务运动与戊戌变法' },
                { day: 5, subject: '新思想', title: '五位一体总体布局' },
                { day: 6, subject: '近代史', title: '辛亥革命' },
                { day: 7, subject: '新思想', title: '四个全面战略布局' },
                { day: 8, subject: '近代史', title: '五四运动与中共成立' },
                { day: 9, subject: '新思想', title: '新发展理念' },
                { day: 10, subject: '近代史', title: '抗日战争' },
                { day: 11, subject: '新思想', title: '全面深化改革' },
                { day: 12, subject: '近代史', title: '解放战争与新中国成立' },
                { day: 13, subject: '新思想', title: '新思想核心要点' },
                { day: 14, subject: '近代史', title: '近代史综合' }
            ];
            
            let html = '';
            for (let i = 0; i < plan.length; i++) {
                const p = plan[i];
                const isPast = p.day < currentDay;
                const isToday = p.day === currentDay;
                const isFuture = p.day > currentDay;
                
                // 计算当天需要复习的内容（艾宾浩斯：1,2,4,7,15天前学的内容）
                const reviewDays = [1, 2, 4, 7];
                const reviews = [];
                for (const interval of reviewDays) {
                    const reviewDay = p.day - interval;
                    if (reviewDay >= 1) {
                        const r = plan.find(x => x.day === reviewDay);
                        if (r) reviews.push(`${r.subject}Day${r.day}`);
                    }
                }
                
                let status = '';
                if (isPast) status = '<span style="color: var(--success)">✓ 已完成</span>';
                else if (isToday) status = '<span style="color: var(--warning)">📍 今天</span>';
                else status = '<span style="color: var(--text-muted)">待定</span>';
                
                html += `
                    <tr style="${isToday ? 'background: rgba(102, 126, 234, 0.2)' : ''}">
                        <td><span class="day-badge">Day ${p.day}</span></td>
                        <td>${p.subject} · ${p.title}</td>
                        <td>${reviews.length > 0 ? reviews.join(', ') : '-'}</td>
                        <td>${status}</td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        }

        // ==================== 交互功能 ====================
        
        function showSection(section) {
            // 更新标签状态
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            // 更新内容区域
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + section).classList.add('active');
            
            // 重新渲染
            if (section === 'map') renderSubjects();
            else if (section === 'review') renderReview();
            else if (section === 'weak') renderWeakPoints();
            else if (section === 'stats') renderStats();
        }

        function startQuiz(subjectId, levelId) {
            const subject = SUBJECTS.find(s => s.id === subjectId);
            const level = subject.levels.find(l => l.id === levelId);
            const progress = appData.progress[levelId];
            
            currentQuiz = { subject, level, progress };
            currentQuestion = { ...level };
            
            document.getElementById('quizTitle').textContent = `${subject.name} - ${level.title}`;
            document.getElementById('questionText').textContent = level.question;
            
            // 渲染选项
            const optionsList = document.getElementById('optionsList');
            optionsList.innerHTML = level.options.map((opt, idx) => `
                <div class="option-item" onclick="selectAnswer(${idx})" data-index="${idx}">
                    ${String.fromCharCode(65 + idx)}. ${opt}
                </div>
            `).join('');
            
            // 更新进度星
            updateStreakStars(progress.streak);
            
            // 清空反馈
            document.getElementById('feedbackArea').innerHTML = '';
            
            // 显示模态框
            document.getElementById('quizModal').classList.add('active');
        }

        function updateStreakStars(streak) {
            const stars = document.querySelectorAll('.streak-star');
            stars.forEach((star, idx) => {
                star.classList.toggle('active', idx < streak);
            });
        }

        function selectAnswer(selectedIndex) {
            const options = document.querySelectorAll('.option-item');
            const correctIndex = currentQuiz.level.answer;
            const progress = currentQuiz.progress;
            
            // 禁用所有选项
            options.forEach(opt => opt.classList.add('disabled'));
            
            // 标记对错
            options[selectedIndex].classList.add(selectedIndex === correctIndex ? 'correct' : 'wrong');
            if (selectedIndex !== correctIndex) {
                options[correctIndex].classList.add('correct');
            }
            
            // 更新统计数据
            appData.totalAttempts++;
            
            const feedbackArea = document.getElementById('feedbackArea');
            
            if (selectedIndex === correctIndex) {
                // 答对了
                appData.correctAttempts++;
                progress.streak++;
                progress.lastReviewed = new Date().toISOString();
                
                // 记录复习时间
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const todayStr = today.toISOString();
                if (!progress.reviews.includes(todayStr)) {
                    progress.reviews.push(todayStr);
                }
                
                if (!progress.firstLearned) {
                    progress.firstLearned = new Date().toISOString();
                }
                
                // 检查是否通关
                if (progress.streak >= MASTER_THRESHOLD && !progress.mastered) {
                    progress.mastered = true;
                    progress.reviewCount++;
                    
                    feedbackArea.innerHTML = `
                        <div class="feedback-msg mastered celebrate">
                            🎉 恭喜通关！连续答对3次，${currentQuiz.level.title} 已掌握！
                        </div>
                        <button class="btn btn-success" style="width: 100%; margin-top: 15px;" onclick="closeQuiz()">
                            继续加油
                        </button>
                    `;
                    
                    // 更新星星
                    updateStreakStars(MASTER_THRESHOLD);
                } else {
                    feedbackArea.innerHTML = `
                        <div class="feedback-msg success">
                            ✅ 回答正确！连续答对 ${progress.streak}/${MASTER_THRESHOLD} 次即可通关
                        </div>
                        <button class="btn btn-success" style="width: 100%; margin-top: 15px;" onclick="nextQuestion()">
                            下一题
                        </button>
                    `;
                    updateStreakStars(progress.streak);
                }
            } else {
                // 答错了，重置连对
                const oldStreak = progress.streak;
                progress.streak = 0;
                progress.errorCount++;
                progress.lastReviewed = new Date().toISOString();
                
                feedbackArea.innerHTML = `
                    <div class="feedback-msg error shake">
                        ❌ 回答错误！连对进度已重置，需要连续答对3次才能通关
                    </div>
                    <button class="btn" style="width: 100%; margin-top: 15px;" onclick="nextQuestion()">
                        重新挑战
                    </button>
                `;
                
                updateStreakStars(0);
            }
            
            saveData(appData);
            renderStatsBar();
        }

        function nextQuestion() {
            // 随机打乱选项顺序，生成新题目
            const level = currentQuiz.level;
            const correctOption = level.options[level.answer];
            
            // 创建选项副本并打乱
            const shuffledOptions = [...level.options].sort(() => Math.random() - 0.5);
            const newCorrectIndex = shuffledOptions.indexOf(correctOption);
            
            currentQuestion = {
                ...level,
                options: shuffledOptions,
                answer: newCorrectIndex
            };
            
            // 重新渲染
            document.getElementById('questionText').textContent = level.question;
            
            const optionsList = document.getElementById('optionsList');
            optionsList.innerHTML = shuffledOptions.map((opt, idx) => `
                <div class="option-item" onclick="selectAnswer(${idx})" data-index="${idx}">
                    ${String.fromCharCode(65 + idx)}. ${opt}
                </div>
            `).join('');
            
            document.getElementById('feedbackArea').innerHTML = '';
        }

        function closeQuiz() {
            document.getElementById('quizModal').classList.remove('active');
            currentQuiz = null;
            currentQuestion = null;
            
            // 刷新当前视图
            renderSubjects();
            renderReview();
            renderWeakPoints();
        }

        function resetAllData() {
            if (confirm('确定要重置所有学习数据吗？这将清空所有进度和记录。')) {
                localStorage.removeItem(getStorageKey());
                appData = initializeData();
                saveData(appData);
                
                renderStatsBar();
                renderSubjects();
                renderReview();
                renderWeakPoints();
                renderStats();
                
                alert('数据已重置，重新开始你的闯关之旅吧！');
            }
        }

        // ==================== 初始化 ====================
        
        function init() {
            checkIn();
            renderStatsBar();
            renderSubjects();
            renderReview();
            renderWeakPoints();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
